
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Quiz App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:800px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:20px;
      text-align:center;
      color:darkblue;
    }

    .question-box{
      margin-bottom:25px;
      padding:15px;
      border:1px solid #ddd;
      border-radius:8px;
    }

    .question{
      font-weight:bold;
      margin-bottom:10px;
    }

    label{
      display:block;
      margin:8px 0;
      cursor:pointer;
    }

    button{
      padding:12px 20px;
      border:none;
      background:darkblue;
      color:white;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
      width:100%;
    }

    button:hover{
      background:blue;
    }

    #result{
      margin-top:25px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      color:green;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>JavaScript Quiz</h1>

  <form>

  <div class="question-box">
    <div class="question">1. What does querySelector() return?</div>

    <label><input type="radio" name="q1" value="a"> All matching elements</label>
    <label><input type="radio" name="q1" value="b"> The first matching element</label>
    <label><input type="radio" name="q1" value="c"> Only IDs</label>
    <label><input type="radio" name="q1" value="d"> Only classes</label>
  </div>

  <div class="question-box">
    <div class="question">2. Which symbol is used to select an ID?</div>

    <label><input type="radio" name="q2" value="a"> .</label>
    <label><input type="radio" name="q2" value="b"> *</label>
    <label><input type="radio" name="q2" value="c"> #</label>
    <label><input type="radio" name="q2" value="d"> @</label>
  </div>

  <div class="question-box">
    <div class="question">3. Which method returns all matching elements?</div>

    <label><input type="radio" name="q3" value="a"> getElementById()</label>
    <label><input type="radio" name="q3" value="b"> querySelector()</label>
    <label><input type="radio" name="q3" value="c"> querySelectorAll()</label>
    <label><input type="radio" name="q3" value="d"> innerHTML()</label>
  </div>

  <div class="question-box">
    <div class="question">4. What does localStorage store?</div>

    <label><input type="radio" name="q4" value="a"> Images only</label>
    <label><input type="radio" name="q4" value="b"> Temporary variables</label>
    <label><input type="radio" name="q4" value="c"> Key-value pairs</label>
    <label><input type="radio" name="q4" value="d"> HTML tags</label>
  </div>

  <div class="question-box">
    <div class="question">5. Which method stores data in localStorage?</div>

    <label><input type="radio" name="q5" value="a"> getItem()</label>
    <label><input type="radio" name="q5" value="b"> setItem()</label>
    <label><input type="radio" name="q5" value="c"> removeItem()</label>
    <label><input type="radio" name="q5" value="d"> clear()</label>
  </div>

</form>

  <button onclick="submitQuiz()">
    Submit Answers
  </button>

  <div id="result"></div>

</div>

<script>

function submitQuiz(){

  let score = 0;

  // Question 1
  let q1 = document.querySelector('input[name="q1"]:checked');
  if(q1 && q1.value === "b"){
    score++;
  }

  // Question 2
  let q2 = document.querySelector('input[name="q2"]:checked');
  if(q2 && q2.value === "c"){
    score++;
  }

  // Question 3
  let q3 = document.querySelector('input[name="q3"]:checked');
  if(q3 && q3.value === "c"){
    score++;
  }

  // Question 4
  let q4 = document.querySelector('input[name="q4"]:checked');
  if(q4 && q4.value === "c"){
    score++;
  }

  // Question 5
  let q5 = document.querySelector('input[name="q5"]:checked');
  if(q5 && q5.value === "b"){
    score++;
  }

  document.getElementById("result").innerHTML =
    "You scored " + score + " out of 5";

}

</script>

</body>
</html>
