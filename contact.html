<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #1a237e;
}
.contact-info {
  text-align: center;
  margin-bottom: 30px;
}
form {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, textarea, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
button {
  background: #1a237e;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover {
  background: #1a237e;
}
</style>
</head>
<body>

<h1>Contact Us</h1>

<div class="contact-info">
  <p>Email: coursemanagment@gmail.com</p>
  <p>Phone: +250 795194649</p>
  <p>Address: Kigali, Rwanda</p>
</div>

<form>
  <label for="name">Names:</label>
  <input type="text" id="name" name="name">

  <label for="email">Email:</label>
  <input type="email" id="email" name="email">

  <label for="message">Message:</label>
  <textarea id="message" name="message"></textarea>

  <button type="submit">Send</button>
</form>

</body>
</html>
